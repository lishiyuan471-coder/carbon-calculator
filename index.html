<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道路全生命周期碳排放计算器</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 100%);
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            line-height: 1.5;
        }

        .main-container {
            display: flex;
            gap: 24px;
            max-width: 1440px;
            margin: 0 auto;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        /* 左侧控制面板 */
        .left-panel {
            flex: 1 1 520px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            transition: var(--transition);
        }

        /* 右侧结果面板 */
        .right-panel {
            flex: 1.2 1 600px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            transition: var(--transition);
        }

        /* 标题样式 */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            margin: 24px 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 18px;
            background: var(--primary);
            border-radius: 3px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 8px 0 16px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #f1f5f9;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .radio-group label:hover {
            background: #e0f2fe;
            border-color: #bae6fd;
        }
        .radio-group input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }
        .radio-group input[type="radio"]:checked + span {
            color: var(--primary-dark);
        }

        /* 结构层选择行 */
        .layer-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            gap: 12px;
        }
        .layer-row label {
            min-width: 70px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .layer-row select {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 14px;
            transition: var(--transition);
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23475569" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            cursor: pointer;
        }
        .layer-row select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
        }

        /* 参数设置网格 */
        .params-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px 16px;
            align-items: center;
            margin: 12px 0;
        }
        .params-grid span {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .params-grid select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: white;
            transition: var(--transition);
            cursor: pointer;
        }

        /* 养护表格 */
        .maint-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            background: #f8fafc;
            border-radius: 8px;
            overflow: hidden;
        }
        .maint-table th {
            background: #f1f5f9;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .maint-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .maint-table input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
        }

        /* 运营方案卡片 */
        .op-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid var(--border);
        }
        .op-sub {
            margin-left: 24px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .op-sub label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        /* 按钮样式 */
        .btn-calc {
            background: linear-gradient(135deg, var(--primary), #0284c7);
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 24px 0 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(14,165,233,0.4);
            letter-spacing: 0.5px;
        }
        .btn-calc:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14,165,233,0.5);
        }
        .btn-calc:active {
            transform: translateY(0);
        }

        /* 结果表格 */
        .result-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 12px 0 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .result-table th {
            background: #0ea5e9;
            color: white;
            padding: 12px 14px;
            font-weight: 600;
            font-size: 13px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-table td {
            padding: 10px 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            background: white;
        }
        .result-table tr:last-child td {
            border-bottom: none;
            font-weight: 700;
            background: #f0f9ff;
        }
        .result-table tr:hover td {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }

        /* 自定义滚动条 */
        .left-panel::-webkit-scrollbar,
        .right-panel::-webkit-scrollbar {
            width: 6px;
        }
        .left-panel::-webkit-scrollbar-track,
        .right-panel::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .left-panel::-webkit-scrollbar-thumb,
        .right-panel::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .left-panel, .right-panel {
                max-height: none;
            }
        }
    </style>
</head>

            </div>

            <div class="section-title">二、各结构层方案选择</div>
            <div id="layerContainer"></div>

            <div class="section-title">三、施工方式 / 报废拆除比例</div>

                <select id="buildType">

                <span>报废拆除比例</span>
                <select id="demolishRatio">

                    <option value="50%">50%</option>
                    <option value="60%">60%</option>

            <div class="section-title">四、养护方案</div>
            <div id="maintenanceContainer">

                    <thead><tr><th>养护方案</th><th>施工方式</th><th>养护次数</th></tr></thead>

            const baseSchemesMain = { "路基": "碎石", "上面层": "细粒式沥青混凝土 SMA-13（热拌）", "中面层": "中粒式沥青混凝土 AC-20(热拌)", "下面层": "粗粒式沥青混凝土 AC-25（热拌）", "基层": "水泥稳定碎石" };
            const baseSchemesSub = { "路基": "碎石", "上面层": "细粒式沥青混凝土 SMA-13（热拌）", "下面层": "粗粒式沥青混凝土 AC-25（热拌）", "基层": "水泥稳定碎石" };
            const baseSchemesSidewalk = { "路基": "级配碎石", "基层": "水泥稳定碎石", "面层": "细粒式沥青混凝土AC-13" };

            const COL = { ROAD_TYPE:0, LAYER:1, PLAN:2, RAW_MATERIAL:3, MIXING:4, TRANSPORT:5, CONST_TRAD_0:6, CONST_TRAD_20:7, CONST_TRAD_25:8, CONST_TRAD_30:9, CONST_NEW_0:10, CONST_NEW_20:11, CONST_NEW_25:12, CONST_NEW_30:13, DEMO_0:14, DEMO_30:15, DEMO_40:16, DEMO_50:17, DEMO_60:18 };
            const CONSTRUCTION_BASE = "传统";
            const DEMOLISH_EQUIP = 109.77127;

            function findRow(df, layer, plan) { return df.find(r => r[COL.LAYER] === layer && r[COL.PLAN] === plan); }
            function getConstructionValue(row, buildType, compactionRatio) {
                const map = { "传统-0%":COL.CONST_TRAD_0, "传统-20%":COL.CONST_TRAD_20, "传统-25%":COL.CONST_TRAD_25, "传统-30%":COL.CONST_TRAD_30, "新能源-0%":COL.CONST_NEW_0, "新能源-20%":COL.CONST_NEW_20, "新能源-25%":COL.CONST_NEW_25, "新能源-30%":COL.CONST_NEW_30 };
                return row[map[`${buildType}-${compactionRatio}`]] || 0;
            }
            function getDemolishValue(row, ratio) {
                const map = { "0%":COL.DEMO_0, "30%":COL.DEMO_30, "40%":COL.DEMO_40, "50%":COL.DEMO_50, "60%":COL.DEMO_60 };
                return row[map[ratio]] || 0;
            }
            function calcEmission(df, schemeDict, buildType, demolishRatio, compactionRatio) {
                const stage = { "原材料生产":0, "拌和":0, "运输":0, "主体施工":0, "报废拆除":0 };
                for (const [layer, plan] of Object.entries(schemeDict)) {
                    const row = findRow(df, layer, plan);
                    if (!row) continue;
                    stage["原材料生产"] += row[COL.RAW_MATERIAL];
                    stage["拌和"] += row[COL.MIXING];
                    stage["运输"] += row[COL.TRANSPORT];
                    stage["主体施工"] += getConstructionValue(row, buildType, compactionRatio);
                    stage["报废拆除"] += getDemolishValue(row, demolishRatio);
                }
                stage["报废拆除"] += DEMOLISH_EQUIP;
                const total = Object.values(stage).reduce((a,b)=>a+b,0);
                return { stage, total };
            }
            function calcConstructionEmission(df, schemeDict, buildType, compactionRatio) {
                let res = 0;
                for (const [layer, plan] of Object.entries(schemeDict)) {
                    const row = findRow(df, layer, plan);
                    if (row) res += getConstructionValue(row, buildType, compactionRatio);
                }
                return res;
            }

            let currentRoadType = "main";

                if (currentRoadType === "sub") return { df: roadDataSub, maintenance: maintenanceData, baseScheme: baseSchemesSub, roadName: "次干道", hasOperation: true };
                return { df: roadDataSidewalk, maintenance: maintenanceDataSidewalk, baseScheme: baseSchemesSidewalk, roadName: "人行道道路", hasOperation: false };
            }

            function bindOperationEvents() {
                const pvParent = document.getElementById('pvParent');
                const pvChildren = document.querySelectorAll('.pv-child');
                const pvDivider = document.getElementById('pvDivider');
                const pvDividerRatio = document.getElementById('pvDividerRatio');
                const ledCheck = document.getElementById('ledCheck');
                const ledLevel = document.getElementById('ledLevel');
                const treeCheck = document.getElementById('treeCheck');
                const treeArbor = document.getElementById('treeArbor');
                const treeShrub = document.getElementById('treeShrub');

                function updatePvParentState() {
                    const allChecked = Array.from(pvChildren).every(cb => cb.checked);
                    const noneChecked = Array.from(pvChildren).every(cb => !cb.checked);
                    pvParent.checked = allChecked;
                    pvParent.indeterminate = !allChecked && !noneChecked;
                }
                pvParent.addEventListener('change', function() {
                    pvChildren.forEach(cb => cb.checked = this.checked);
                    pvDividerRatio.disabled = !pvDivider.checked;
                    updatePvParentState();
                });
                pvChildren.forEach(cb => cb.addEventListener('change', function() {
                    if (cb === pvDivider) pvDividerRatio.disabled = !cb.checked;
                    updatePvParentState();
                }));
                ledCheck.addEventListener('change', () => ledLevel.disabled = !ledCheck.checked);
                treeCheck.addEventListener('change', () => { treeArbor.disabled = !treeCheck.checked; treeShrub.disabled = !treeCheck.checked; });
                updatePvParentState();
            }

            function calculate() {
                const buildType = document.getElementById('buildType').value;
                const demolishRatio = document.getElementById('demolishRatio').value;
                const compactionRatio = document.getElementById('compactionRatio').value;
                const userScheme = {};
                document.querySelectorAll('.layer-select').forEach(sel => userScheme[sel.dataset.layer] = sel.value);

                const baseDemolishRatio = "0%";
                const userResult = calcEmission(currentDf, userScheme, buildType, demolishRatio, compactionRatio);
                const baseResult = calcEmission(currentDf, currentBaseScheme, CONSTRUCTION_BASE, baseDemolishRatio, "0%");

                const baseCon = calcConstructionEmission(currentDf, userScheme, CONSTRUCTION_BASE, "0%");
                const nowCon = calcConstructionEmission(currentDf, userScheme, buildType, compactionRatio);
                const reduceCon = baseCon - nowCon;
                const rateCon = baseCon ? (reduceCon / baseCon * 100) : 0;

                const maintChecks = document.querySelectorAll('.maint-check');
                const maintBuilds = document.querySelectorAll('.maint-build');
                const maintCounts = document.querySelectorAll('.maint-count');
                const maintList = [];
                let totalMaintenance = 0, baseTotalMaintenance = 0;
                maintChecks.forEach((cb, idx) => {
                    if (cb.checked) {
                        const name = currentMaintenance[idx][1];
                        const btype = maintBuilds[idx].value;
                        let count = parseInt(maintCounts[idx].value) || 1;
                        const row = currentMaintenance[idx];
                        const singleEmi = row[2] + row[3] + row[4] + (btype==="传统"? row[5] : row[6]);
                        const totalEmi = singleEmi * count;
                        const baseSingleEmi = row[2] + row[3] + row[4] + row[5];
                        const baseTotalEmi = baseSingleEmi * count;
                        maintList.push({ name, btype, count, singleEmi, totalEmi, baseTotalEmi });
                        totalMaintenance += totalEmi;
                        baseTotalMaintenance += baseTotalEmi;
                    }
                });

                const operationList = [];
                let totalOperation = 0;
                if (currentRoadType === 'main' || currentRoadType === 'sub') {
                    const opData = operationData[currentRoadName];
                    if (document.getElementById('pvBus')?.checked) { const e=opData["光伏"]["光伏公交站台"]; operationList.push({level1:"光伏",level2:"光伏公交站台",level3:"",emission:e}); totalOperation+=e; }
                    if (document.getElementById('pvLight')?.checked) { const e=opData["光伏"]["光伏智能路灯"]; operationList.push({level1:"光伏",level2:"光伏智能路灯",level3:"",emission:e}); totalOperation+=e; }
                    if (document.getElementById('pvDivider')?.checked) { const r=document.getElementById('pvDividerRatio').value; const e=opData["光伏"]["中央分隔带位置设置光伏板"][r]; operationList.push({level1:"光伏",level2:"中央分隔带位置设置光伏板",level3:r,emission:e}); totalOperation+=e; }
                    if (document.getElementById('ledCheck')?.checked) { const l=document.getElementById('ledLevel').value; const e=opData["LED"][l]; operationList.push({level1:"LED",level2:l,level3:"",emission:e}); totalOperation+=e; }
                    if (document.getElementById('treeCheck')?.checked) {
                        const arborType = document.getElementById('treeArbor').value;
                        const arborEmi = opData["植树"]["乔木"][arborType];
                        operationList.push({level1:"植树",level2:"乔木",level3:arborType,emission:arborEmi}); totalOperation+=arborEmi;
                        const shrubType = document.getElementById('treeShrub').value;
                        const shrubEmi = opData["植树"]["灌木"][shrubType];
                        operationList.push({level1:"植树",level2:"灌木",level3:shrubType,emission:shrubEmi}); totalOperation+=shrubEmi;
                    }
                }

                const reduceAll = baseResult.total - userResult.total;
                const totalReduce = reduceAll - totalOperation + (baseTotalMaintenance - totalMaintenance);
                const totalBaseEmission = baseResult.total + baseTotalMaintenance;
                const totalRate = totalBaseEmission ? (totalReduce / totalBaseEmission * 100) : 0;

                renderResults(userResult, baseResult, baseCon, nowCon, reduceCon, rateCon, maintList, totalMaintenance, baseTotalMaintenance, operationList, totalOperation, totalReduce, totalRate);
            }

            function renderResults(userResult, baseResult, baseCon, nowCon, reduceCon, rateCon, maintList, totalMaintenance, baseTotalMaintenance, operationList, totalOperation, totalReduce, totalRate) {
                const panel = document.getElementById('resultPanel');
                const newTotal = userResult.stage["原材料生产"] + userResult.stage["拌和"] + userResult.stage["运输"] + userResult.stage["主体施工"] + totalMaintenance + userResult.stage["报废拆除"] + ((currentRoadType==='main'||currentRoadType==='sub')?totalOperation:0);

                let html = `<div style="font-size:18px;font-weight:700;margin-bottom:16px;">${currentRoadName} 碳排放计算结果</div>`;
                html += `<div class="section-title" style="margin-top:0;">一、各阶段碳排放</div><table class="result-table"><tr><th>排放阶段</th><th>碳排放(kg CO₂e)</th></tr>`;
                for (const [stage,val] of Object.entries(userResult.stage)) {
                    if (stage !== "报废拆除") html += `<tr><td>${stage}</td><td>${val.toFixed(2)}</td></tr>`;
                }
                if (currentRoadType==='main'||currentRoadType==='sub') html += `<tr><td>运营</td><td>${totalOperation.toFixed(2)}</td></tr>`;
                html += `<tr><td>养护</td><td>${totalMaintenance.toFixed(2)}</td></tr>`;
                html += `<tr><td>报废拆除</td><td>${userResult.stage["报废拆除"].toFixed(2)}</td></tr>`;
                html += `<tr style="font-weight:700;"><td>道路工程合计</td><td>${newTotal.toFixed(2)}</td></tr></table>`;

                if (maintList.length) {
                    html += `<div class="section-title">二、已勾选养护碳排放</div><table class="result-table"><tr><th>养护方案</th><th>施工方式</th><th>次数</th><th>单次排放</th><th>总排放</th></tr>`;
                    maintList.forEach(i => html += `<tr><td>${i.name}</td><td>${i.btype}施工</td><td>${i.count}</td><td>${i.singleEmi.toFixed(2)}</td><td>${i.totalEmi.toFixed(2)}</td></tr>`);
                    html += `</table>`;
                }

                html += `<div class="section-title">三、施工方式减碳对比</div><table class="result-table"><tr><th>对比项</th><th>数值</th></tr>
                    <tr><td>传统施工排放（0%）</td><td>${baseCon.toFixed(2)}</td></tr>
                    <tr><td>当前施工排放（${document.getElementById('compactionRatio').value}）</td><td>${nowCon.toFixed(2)}</td></tr>
                    <tr><td>施工减碳量</td><td>${reduceCon.toFixed(2)}</td></tr>
                    <tr><td>施工减碳比例</td><td>${rateCon.toFixed(2)}%</td></tr></table>`;

                if ((currentRoadType==='main'||currentRoadType==='sub') && operationList.length) {
                    html += `<div class="section-title">四、已勾选运营方案碳排放</div><table class="result-table"><tr><th>一级</th><th>二级</th><th>三级</th><th>碳排放量</th></tr>`;
                    operationList.forEach(i => html += `<tr><td>${i.level1}</td><td>${i.level2}</td><td>${i.level3}</td><td>${i.emission.toFixed(2)}</td></tr>`);
                    html += `<tr style="font-weight:700;"><td colspan="3">汇总</td><td>${totalOperation.toFixed(2)}</td></tr></table>`;
                }

                html += `<div class="section-title">五、整体方案减碳对比</div><table class="result-table"><tr><th>阶段</th><th>减碳量</th><th>减碳比例</th></tr>`;
                ["原材料生产","拌和","运输","主体施工"].forEach(s => {
                    const diff = baseResult.stage[s] - userResult.stage[s];
                    const rt = baseResult.stage[s] ? (diff/baseResult.stage[s]*100) : 0;
                    html += `<tr><td>${s}</td><td>${diff.toFixed(2)}</td><td>${rt.toFixed(2)}%</td></tr>`;
                });
                if (currentRoadType==='main'||currentRoadType==='sub') html += `<tr><td>运营</td><td>${(-totalOperation).toFixed(2)}</td><td>-</td></tr>`;
                const maintReduce = baseTotalMaintenance - totalMaintenance;
                html += `<tr><td>养护</td><td>${maintReduce.toFixed(2)}</td><td>${baseTotalMaintenance ? (maintReduce/baseTotalMaintenance*100).toFixed(2)+'%' : '-'}</td></tr>`;
                const demoDiff = baseResult.stage["报废拆除"] - userResult.stage["报废拆除"];
                html += `<tr><td>报废拆除</td><td>${demoDiff.toFixed(2)}</td><td>${baseResult.stage["报废拆除"] ? (demoDiff/baseResult.stage["报废拆除"]*100).toFixed(2)+'%' : '-'}</td></tr>`;
                html += `<tr style="font-weight:700;"><td>全局总计</td><td>${totalReduce.toFixed(2)}</td><td>${totalRate.toFixed(2)}%</td></tr></table>`;

                panel.innerHTML = html;
            }

            document.querySelectorAll('input[name="roadType"]').forEach(radio => radio.addEventListener('change', function() {
                currentRoadType = this.value; updateUI();
            }));
            document.getElementById('calcBtn').addEventListener('click', calculate);
            updateUI();
        })();
    </script>
</body>
</html>
